<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B2FF7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Vault door background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#g1)" opacity="0.15"/>
  <rect x="4" y="4" width="56" height="56" rx="14" stroke="url(#g1)" stroke-width="1.5"/>
  <!-- Vault circle -->
  <circle cx="32" cy="32" r="18" stroke="url(#g2)" stroke-width="2"/>
  <!-- Cross handle -->
  <line x1="32" y1="18" x2="32" y2="46" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18" y1="32" x2="46" y2="32" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center circle -->
  <circle cx="32" cy="32" r="5" fill="url(#g1)"/>
  <!-- Bolts -->
  <circle cx="32" cy="14" r="2" fill="#7B2FF7" opacity="0.6"/>
  <circle cx="50" cy="32" r="2" fill="#7B2FF7" opacity="0.6"/>
</svg>
